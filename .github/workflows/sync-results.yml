name: Sync Benchmark Results from GCS

on:
  schedule:
    # Every 6 hours as fallback to Pub/Sub push
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      benchmark:
        description: 'Specific benchmark to sync (or "all")'
        required: false
        default: 'all'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install google-cloud-storage

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Sync results from GCS
        run: |
          python scripts/sync_from_gcs.py \
            --bucket otm-public-results \
            --output-dir data/ \
            --benchmark "${{ github.event.inputs.benchmark || 'all' }}"

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet data/; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          BENCHMARKS=$(git diff --name-only data/ | sed 's|data/||;s|\.json||' | tr '\n' ', ' | sed 's/,$//')
          git add data/
          git commit -m "results: ${BENCHMARKS} $(date -u +%Y-%m-%d)"
          git push
